name: Scheduled Script Execution

on:
  schedule:
    - cron: '00 5 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          python3 --version

      - name: Install dependencies
        run: |
          pip3 install --upgrade pip
          pip3 install requests

      - name: Run script
        env:
          NORDOMAIN_30DAY_URL: ${{ secrets.NORDOMAIN_30DAY_URL }}
          NORDOMAIN_14DAY_URL: ${{ secrets.NORDOMAIN_14DAY_URL }}
          PHISHING_30DAY_URL: ${{ secrets.PHISHING_30DAY_URL }}
          PHISHING_14DAY_URL: ${{ secrets.PHISHING_14DAY_URL }}
        run: |
          python3 nrd-hunter.pyc

      - name: Move output files
        run: |
          mv output/nrd-14day.txt lists/14-day/domains-only || true
          mv output/nrd-30day_part1.txt lists/30-day/domains-only || true
          mv output/nrd-30day_part2.txt lists/30-day/domains-only || true
          mv output/nrd-14day_adblock.txt lists/14-day/adblock || true
          mv output/nrd-30day_adblock_part1.txt lists/30-day/adblock || true
          mv output/nrd-30day_adblock_part2.txt lists/30-day/adblock || true
          mv output/nrd-14day_base64.txt lists/14-day/base64 || true
          mv output/nrd-30day_base64_part1.txt lists/30-day/base64 || true
          mv output/nrd-30day_base64_part2.txt lists/30-day/base64 || true
          mv output/nrd-14day_unbound_part1.txt lists/14-day/unbound || true
          mv output/nrd-14day_unbound_part2.txt lists/14-day/unbound || true
          mv output/nrd-30day_unbound_part1.txt lists/30-day/unbound || true
          mv output/nrd-30day_unbound_part2.txt lists/30-day/unbound || true
          mv output/nrd-30day_unbound_part3.txt lists/30-day/unbound || true
          mv output/nrd-14day_wildcard.txt lists/14-day/wildcard || true
          mv output/nrd-30day_wildcard_part1.txt lists/30-day/wildcard || true
          mv output/nrd-30day_wildcard_part2.txt lists/30-day/wildcard || true
          mv output/nrd-phishing-14day.txt lists/14-day_phishing/domains-only || true
          mv output/nrd-phishing-30day.txt lists/30-day_phishing/domains-only || true
          mv output/nrd-phishing-14day_adblock.txt lists/14-day_phishing/adblock || true
          mv output/nrd-phishing-30day_adblock.txt lists/30-day_phishing/adblock || true
          mv output/nrd-phishing-14day_base64.txt lists/14-day_phishing/base64 || true
          mv output/nrd-phishing-30day_base64.txt lists/30-day_phishing/base64 || true
          mv output/nrd-phishing-14day_unbound_part1.txt lists/14-day_phishing/unbound || true
          mv output/nrd-phishing-14day_unbound_part2.txt lists/14-day_phishing/unbound || true
          mv output/nrd-phishing-30day_unbound_part1.txt lists/30-day_phishing/unbound || true
          mv output/nrd-phishing-30day_unbound_part2.txt lists/30-day_phishing/unbound || true
          mv output/nrd-phishing-30day_unbound_part3.txt lists/30-day_phishing/unbound || true
          mv output/nrd-phishing-14day_wildcard.txt lists/14-day_phishing/wildcard || true
          mv output/nrd-phishing-30day_wildcard.txt lists/30-day_phishing/wildcard || true

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add lists/
          git commit -m "Update NRD Lists ($(date +'%Y-%m-%d'))"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
